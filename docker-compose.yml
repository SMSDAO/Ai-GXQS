version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smartprompt-postgres
    environment:
      POSTGRES_DB: smartprompt
      POSTGRES_USER: smartprompt
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartprompt2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smartprompt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartprompt"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smartprompt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartprompt-network
    command: redis-server --appendonly yes

  # Go API Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.go
    container_name: smartprompt-api
    environment:
      DATABASE_URL: postgresql://smartprompt:${DB_PASSWORD:-smartprompt2026}@postgres:5432/smartprompt
      REDIS_URL: redis://redis:6379
      ADMIN_RESERVE_PERCENT: ${ADMIN_RESERVE_PERCENT:-33}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - smartprompt-network
    restart: unless-stopped

  # Rust AI Engine
  ai-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile.rust
    container_name: smartprompt-ai
    environment:
      API_URL: http://api:8080
      REDIS_URL: redis://redis:6379
    depends_on:
      - api
      - redis
    networks:
      - smartprompt-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.react
    container_name: smartprompt-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8081
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - smartprompt-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: smartprompt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - api
    networks:
      - smartprompt-network
    restart: unless-stopped
    profiles:
      - production

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: smartprompt-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - smartprompt-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: smartprompt-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - smartprompt-network

networks:
  smartprompt-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
