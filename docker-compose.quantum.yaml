version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gxqs_quantum
      POSTGRES_USER: gxqs
      POSTGRES_PASSWORD: quantum_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=quantum

  quantum-supremacy:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - mongodb
      - elasticsearch
      - rabbitmq
    environment:
      POSTGRES_DSN: postgresql://gxqs:quantum_2026@postgres:5432/gxqs_quantum
      REDIS_URL: redis://redis:6379
      MONGODB_URL: mongodb://mongodb:27017
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    deploy:
      replicas: 3

volumes:
  postgres_data:
  mongo_data:
  es_data:
