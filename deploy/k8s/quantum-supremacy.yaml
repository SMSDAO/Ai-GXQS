apiVersion: apps/v1
kind: Deployment
metadata:
  name: gxqs-quantum-supremacy
  namespace: gxqs
spec:
  replicas: 5
  selector:
    matchLabels:
      app: gxqs-quantum
  template:
    metadata:
      labels:
        app: gxqs-quantum
    spec:
      containers:
      - name: quantum-supremacy
        image: gxqs/quantum-supremacy:v9.0.0
        ports:
        - containerPort: 8000
        env:
        - name: POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: gxqs-secrets
              key: postgres-dsn
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: gxqs-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gxqs-quantum-service
spec:
  selector:
    app: gxqs-quantum
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gxqs-quantum-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gxqs-quantum-supremacy
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
